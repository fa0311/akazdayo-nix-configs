name: flake update

on:
  schedule:
    - cron: '0 3 1-31/3 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flake-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore / configure Cachix
        uses: cachix/cachix-action@v16
        with:
          name: ${{ vars.CACHIX_CACHE_NAME || 'akazdayo' }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Update flake, build, push to Cachix, and commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update-flake-and-cache.sh
