# Required secrets:
#   GITHUB_TOKEN          - Auto-provided
#   CACHIX_AUTH_TOKEN     - Cachix auth token (existing)
#   ATTIC_ENDPOINT        - Attic server URL (e.g., https://attic.odango.app)
#   ATTIC_TOKEN           - Attic API token (generated via atticd-atticadm make-token)
# Required variables:
#   CACHIX_CACHE_NAME     - Cachix cache name (existing, defaults to 'akazdayo')
#   ATTIC_CACHE           - Attic cache name (e.g., 'akazdayo')

name: flake update

on:
  schedule:
    - cron: '0 3 1-31/3 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flake-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore / configure Cachix
        uses: cachix/cachix-action@v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME || 'akazdayo' }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Set up Attic cache
        uses: ryanccn/attic-action@v0
        with:
          endpoint: ${{ secrets.ATTIC_ENDPOINT }}
          cache: ${{ vars.ATTIC_CACHE }}
          token: ${{ secrets.ATTIC_TOKEN }}

      - name: Update flake, build, push to caches, and commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ATTIC_CACHE: ${{ vars.ATTIC_CACHE }}
        run: ./scripts/update-flake-and-cache.sh
