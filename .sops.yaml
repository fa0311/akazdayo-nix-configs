keys:
  # YubiKey age recipient (replace with your actual key)
  # Generate: age-plugin-yubikey --generate --slot 1 --touch-policy always --name "primary"
  # List:     age-plugin-yubikey --list-all
  - &admin_yubikey age1replace-with-your-yubikey-recipient

  # Host SSH-derived age recipients (fallback for unattended boot)
  # Generate: ssh-to-age -i /etc/ssh/ssh_host_ed25519_key.pub
  - &nixos_host age1replace-with-nixos-host-recipient
  - &server_host age1replace-with-server-host-recipient

creation_rules:
  - path_regex: secrets/nixos/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *admin_yubikey
          - *nixos_host

  - path_regex: secrets/server/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *admin_yubikey
          - *server_host

  - path_regex: secrets/common/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *admin_yubikey
          - *nixos_host
          - *server_host

  # Darwin/macbook home-manager secrets
  - path_regex: secrets/darwin/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *admin_yubikey
